name: AUDAX CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: audax
          POSTGRES_PASSWORD: audax_secret
          POSTGRES_DB: audax
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate
        env:
          DATABASE_URL: postgresql://audax:audax_secret@localhost:5432/audax?schema=public

      - name: Run migrations
        run: npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://audax:audax_secret@localhost:5432/audax?schema=public

      - name: Build API
        run: npm run build --workspace=apps/api

      - name: Build Web
        run: npm run build --workspace=apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api

  docker:
    runs-on: ubuntu-latest
    needs: lint-and-build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker compose build api web

      - name: Start stack
        run: |
          docker compose up -d postgres
          sleep 10
          docker compose up -d api web

      - name: Health check API
        run: |
          sleep 30
          curl -f http://localhost:4000/api/docs || exit 1

      - name: Health check Web
        run: curl -f http://localhost:3000 || exit 1

      - name: Stop stack
        if: always()
        run: docker compose down
